name: CI - Integração Contínua

# Define quando a automação será executada
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

# 2. Configura o ambiente Node.js (Corrigido para setup-node)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instala as dependências (Node lê o seu package.json)
      - name: Install dependencies
        run: npm install

      # 4. Executa o Linting
      - name: Run Lint
        run: npm run lint

      # 5. Executa os Testes
      - name: Run Tests
        run: npm run test